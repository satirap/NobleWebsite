<meta property="og:type" content="website" />
<meta property="og:image" content="./assets/logo-noble-master.jpg" />
<meta name="twitter:card" content="summary_large_image" />

<meta name="twitter:description" content="Full-service IT System Integration — computers, networks, CCTV, access control and on-site IT support." />

<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>

<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; overflow-x: hidden; }
  body { font-family: var(--font-body); color: var(--text-body); background: var(--surface-card); }

  /* Loading spinner */
  #noble-loading {
    position: fixed; inset: 0; z-index: 999;
    display: flex; align-items: center; justify-content: center;
    background: var(--surface-card, #fff);
    transition: opacity 0.3s ease;
  }
  #noble-loading.hidden { opacity: 0; pointer-events: none; }
  .noble-spinner {
    width: 44px; height: 44px;
    border: 3px solid rgba(26,114,214,0.2);
    border-top-color: #1a72d6;
    border-radius: 50%;
    animation: noble-spin 0.8s linear infinite;
  }
  @keyframes noble-spin { to { transform: rotate(360deg); } }

  /* Responsive layout overrides */
  @media (max-width: 900px) {
    .noble-hero-grid { grid-template-columns: 1fr !important; }
    .noble-noc { display: none !important; }
    .noble-nav { display: none !important; }
    .noble-why-grid { grid-template-columns: repeat(2, 1fr) !important; }
  }
  @media (max-width: 768px) {
    .noble-services-grid { grid-template-columns: 1fr !important; }
    .noble-showcase-grid { grid-template-columns: 1fr !important; }
    .noble-works-grid { grid-template-columns: 1fr !important; }
    .noble-contact-grid { grid-template-columns: 1fr !important; }
    .noble-footer-grid { grid-template-columns: 1fr !important; }
    .noble-why-grid { grid-template-columns: 1fr !important; }
  }
</style>
</head>
<body>
<div id="noble-loading"><div class="noble-spinner"></div></div>
<div id="app"></div>

<!-- ==================== Header ==================== -->
<script type="text/babel" data-presets="react">
// The Noble — site Header (glass, sticky) with dropdown submenus + LINE button
function NobleHeader({ lang, setLang, go, data }) {
  const { Button } = window.TheNobleDesignSystem_288042;
  const C = window.NobleContent;
  const Ico = ({ n, s = 14 }) => React.createElement(window.NobleIco, { n, s });
  const [scrolled, setScrolled] = React.useState(false);
  const [openIdx, setOpenIdx] = React.useState(null);
  React.useEffect(() => {
    const onScroll = () => setScrolled(window.scrollY > 12);
    window.addEventListener("scroll", onScroll);
    return () => window.removeEventListener("scroll", onScroll);
  }, []);

  const t = (th, en) => (lang === "th" ? th : en);
  const menu = [
    { label: t("หน้าแรก", "Home"), go: "home" },
    {
      label: t("บริการของเรา", "Services"), go: "services",
      sub: data.services.map((s) => ({ label: s.title[lang], go: "services" })),
    },
    {
      label: t("ผลงานและลูกค้า", "Work & Clients"), go: "portfolio",
      sub: [
        { label: t("ผลงานที่ผ่านมา", "Recent work"), go: "portfolio" },
        ...data.clients.works.slice(0, 6).map((w) => ({ label: w.title[lang], go: "portfolio", dim: true })),
        { label: t("ลูกค้าอ้างอิง", "Trusted by"), go: "portfolio" },
      ],
    },
    { label: t("เกี่ยวกับเรา", "About"), go: "about" },
    { label: t("ติดต่อเรา", "Contact"), go: "contact" },
  ];

  const navItem = {
    display: "inline-flex", alignItems: "center", gap: 5, padding: "8px 13px",
    fontFamily: "var(--font-body)", fontWeight: 500, fontSize: 15, color: "var(--text-body)",
    cursor: "pointer", borderRadius: "var(--radius-sm)", whiteSpace: "nowrap",
    transition: "color var(--duration-fast), background var(--duration-fast)",
  };

  return (
    <React.Fragment>
      <header style={{
        position: "sticky", top: 0, zIndex: 50,
        background: scrolled ? "rgba(255,255,255,0.9)" : "rgba(255,255,255,0.6)",
        backdropFilter: "var(--blur-glass)", WebkitBackdropFilter: "var(--blur-glass)",
        borderBottom: `1px solid ${scrolled ? "var(--border-subtle)" : "transparent"}`,
        transition: "all var(--duration-base) var(--ease-out)",
      }}>
        <div style={{ maxWidth: "var(--container-wide)", margin: "0 auto", padding: "0 var(--container-pad)", height: 72, display: "flex", alignItems: "center", gap: 20 }}>
          <a onClick={() => go("home")} style={{ display: "flex", alignItems: "center", gap: 10, cursor: "pointer", flex: "none" }}>
            <img src="./assets/logo-noble-mark.png" alt="The Noble" style={{ height: 38 }} />
            <span style={{ fontFamily: "var(--font-display)", fontWeight: 700, fontSize: 19, letterSpacing: "0.06em", color: "var(--primary)" }}>{data.brand.name}</span>
          </a>

          <nav className="noble-nav" style={{ display: "flex", gap: 2, marginLeft: 12, flex: 1 }}>
            {menu.map((m, i) => {
              const active = openIdx === i;
              return (
                <div key={i} style={{ position: "relative" }} onMouseEnter={() => setOpenIdx(m.sub ? i : null)} onMouseLeave={() => setOpenIdx(null)}>
                  <a onClick={() => go(m.go)} style={{ ...navItem, color: active ? "var(--primary)" : "var(--text-body)", background: active ? "var(--blue-50)" : "transparent" }}>
                    {m.label}{m.sub && <Ico n="chevron-down" s={14} />}
                  </a>
                  {m.sub && active && (
                    <div style={{ position: "absolute", top: "100%", left: 0, paddingTop: 8 }}>
                      <div style={{ minWidth: 244, background: "var(--surface-card)", borderRadius: "var(--radius-md)", boxShadow: "var(--shadow-lg)", border: "1px solid var(--border-subtle)", padding: 8, display: "flex", flexDirection: "column", gap: 1 }}>
                        {m.sub.map((s, j) => (
                          <a key={j} onClick={() => { go(s.go); setOpenIdx(null); }} style={{
                            display: "flex", alignItems: "center", gap: 9, padding: "9px 12px", borderRadius: "var(--radius-sm)", cursor: "pointer",
                            fontFamily: "var(--font-body)", fontSize: 14, fontWeight: s.dim ? 400 : 500,
                            color: s.dim ? "var(--text-muted)" : "var(--text-strong)",
                          }}
                            onMouseEnter={(e) => { e.currentTarget.style.background = "var(--blue-50)"; e.currentTarget.style.color = "var(--primary)"; }}
                            onMouseLeave={(e) => { e.currentTarget.style.background = "transparent"; e.currentTarget.style.color = s.dim ? "var(--text-muted)" : "var(--text-strong)"; }}
                          >
                            <span style={{ width: 5, height: 5, borderRadius: "50%", background: "var(--accent)", flex: "none", opacity: s.dim ? 0.45 : 1 }}></span>
                            {s.label}
                          </a>
                        ))}
                      </div>
                    </div>
                  )}
                </div>
              );
            })}
          </nav>

          <div style={{ display: "flex", alignItems: "center", gap: 12, flex: "none" }}>
            <div style={{ display: "flex", fontFamily: "var(--font-mono)", fontSize: 12, fontWeight: 600, border: "1px solid var(--border-default)", borderRadius: "var(--radius-pill)", overflow: "hidden" }}>
              {["th", "en"].map((l) => (
                <button key={l} onClick={() => setLang(l)} style={{ padding: "5px 11px", border: "none", cursor: "pointer", textTransform: "uppercase", background: lang === l ? "var(--primary)" : "transparent", color: lang === l ? "#fff" : "var(--text-muted)" }}>{l}</button>
              ))}
            </div>
            <a style={{ fontSize: 14, fontWeight: 500, color: "var(--text-muted)", cursor: "pointer", whiteSpace: "nowrap" }}>{C.login[lang]}</a>
            <Button size="sm" variant="primary" onClick={() => go("contact")}>{C.quote[lang]}</Button>
          </div>
        </div>
      </header>

      {/* Floating LINE contact button (bottom-right) */}
      <a href="https://line.me/ti/p/@thenoble" target="_blank" rel="noopener" title={lang === "th" ? "สอบถามทาง LINE @thenoble" : "Chat on LINE @thenoble"}
        style={{ position: "fixed", right: 22, bottom: 22, zIndex: 93, width: 60, height: 60, borderRadius: "50%", background: "#06C755", display: "flex", alignItems: "center", justifyContent: "center", boxShadow: "0 10px 26px rgba(6,199,85,0.45)", textDecoration: "none", color: "#fff", transition: "transform var(--duration-base) var(--ease-out)" }}
        onMouseEnter={(e) => { e.currentTarget.style.transform = "translateY(-3px) scale(1.05)"; }}
        onMouseLeave={(e) => { e.currentTarget.style.transform = "none"; }}>
        <span style={{ fontFamily: "var(--font-display)", fontWeight: 700, fontSize: 15, letterSpacing: "0.02em", lineHeight: 1 }}>LINE</span>
      </a>
    </React.Fragment>
  );
}
window.NobleHeader = NobleHeader;
</script>

<!-- ==================== Hero ==================== -->
<script type="text/babel" data-presets="react">
// The Noble — Hero with glow + dashboard mock
function NobleHero({ lang, go, data }) {
  const { Button, StatBlock } = window.TheNobleDesignSystem_288042;

  return (

            <span style={{ display: "inline-flex", alignItems: "center", gap: 6, padding: "2px 9px", borderRadius: "var(--radius-pill)", background: "var(--gradient-signal)", fontFamily: "var(--font-display)", fontWeight: 700, fontSize: 11, letterSpacing: "0.04em" }}>NEW</span>

          <div style={{ display: "flex", gap: 12, flexWrap: "wrap" }}>

          </div>
          <div style={{ display: "flex", gap: 36, marginTop: 40, flexWrap: "wrap" }}>
            {data.stats.slice(0, 3).map((s, i) => <StatBlock key={i} value={s.value} label={s.label[lang]} tone="light" />)}

        </div>

        {/* NOC monitor mock */}
        <div className="noble-noc" style={{ position: "relative" }}>

            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 14 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 8, color: "#fff", fontFamily: "var(--font-mono)", fontSize: 12 }}>

              ))}

}
window.NobleHero = NobleHero;
</script>

<!-- ==================== Sections ==================== -->
<script type="text/babel" data-presets="react">
// The Noble — Services grid + Showcase + Why-us + CTA band
function NobleSections({ lang, go, data }) {
  const { SectionHeading, ServiceCard, StatBlock, Button } = window.TheNobleDesignSystem_288042;
  const C = window.NobleContent;
  const Ico = ({ n, s = 24 }) => React.createElement(window.NobleIco, { n, s });
  const wrap = { maxWidth: "var(--container-wide)", margin: "0 auto", padding: "0 var(--container-pad)" };
  const SH = data.servicesHead, SC = data.showcase;

  return (
    <React.Fragment>
      {/* Services */}
      <section id="services" style={{ position: "relative", overflow: "hidden", background: "var(--surface-page)", padding: "var(--section-gap) 0" }}>
        <div style={{ ...wrap, position: "relative" }}>
          <SectionHeading align="center" eyebrow={SH.eyebrow[lang]} title={SH.title[lang]} description={SH.sub[lang]} />

            <div style={{ borderRadius: "var(--radius-xl)", overflow: "hidden", boxShadow: "var(--shadow-xl)", aspectRatio: "4 / 3" }}>

          <SectionHeading align="center" eyebrow={C.whyHead.eyebrow[lang]} title={<span style={{ color: "#fff" }}>{C.whyHead.title[lang]}</span>} />

              <div key={i} style={{ background: "rgba(255,255,255,0.04)", border: "1px solid rgba(255,255,255,0.1)", borderRadius: "var(--radius-lg)", padding: 26 }}>

                  <Ico n={w.icon} s={22} />

                <h3 style={{ margin: "0 0 8px", fontFamily: "var(--font-display)", fontSize: 18, fontWeight: 600, color: "#fff" }}>{w.title[lang]}</h3>

window.NobleSections = NobleSections;

<!-- ==================== Clients ==================== -->
<script type="text/babel" data-presets="react">
// The Noble — Clients & Works (ผลงาน / ลูกค้าอ้างอิง) + closing CTA band.
function NobleClients({ lang, go, data }) {
  const { SectionHeading, Button, Badge } = window.TheNobleDesignSystem_288042;
  const C = window.NobleContent;
  const CL = data.clients;
  const Ico = ({ n, s = 18 }) => React.createElement(window.NobleIco, { n, s });
  const wrap = { maxWidth: "var(--container-wide)", margin: "0 auto", padding: "0 var(--container-pad)" };

  const groups = [
    { key: "gov", label: { th: "ภาครัฐ", en: "Public sector" } },
    { key: "private", label: { th: "ภาคเอกชน", en: "Private sector" } },
    { key: "partner", label: { th: "พันธมิตรเทคโนโลยี", en: "Technology partners" } },
  ];
  const initials = (n) => n.replace(/[^A-Za-zก-ฮ0-9 ]/g, "").trim().split(/\s+/).slice(0, 2).map((w) => w[0]).join("").toUpperCase() || "•";

  const ProjectCard = ({ w }) => {
    const [hov, setHov] = React.useState(false);
    return (
      <div onMouseEnter={() => setHov(true)} onMouseLeave={() => setHov(false)}
        style={{ background: "var(--surface-card)", borderRadius: "var(--radius-lg)", overflow: "hidden", boxShadow: hov ? "var(--shadow-lg)" : "var(--shadow-sm), var(--ring-hairline)", transform: hov ? "translateY(-3px)" : "none", transition: "all var(--duration-base) var(--ease-out)", display: "flex", flexDirection: "column" }}>

<script type="text/babel" data-presets="react">
// The Noble — full content CMS. Edits brand, hero, services, stats,
// clients/works, showcase and contact — text + images — persisted via NobleStore.
// Leaf field components live at module scope so inputs keep focus across renders.

function cmsDownscale(file, max, cb) {
  if (!file) return;
  const fr = new FileReader();
  fr.onload = () => {
    const img = new Image();
    img.onload = () => {
      const scale = Math.min(1, max / Math.max(img.width, img.height));
      const cv = document.createElement("canvas");
      cv.width = Math.round(img.width * scale); cv.height = Math.round(img.height * scale);
      cv.getContext("2d").drawImage(img, 0, 0, cv.width, cv.height);
      cb(cv.toDataURL("image/jpeg", 0.82));
    };
    img.src = fr.result;
  };
  fr.readAsDataURL(file);
}

const cmsLabel = { fontFamily: "var(--font-mono)", fontSize: 10.5, textTransform: "uppercase", letterSpacing: ".07em", color: "var(--text-faint)", marginBottom: 5, display: "block" };
const cmsBox = { width: "100%", padding: "9px 11px", borderRadius: "var(--radius-sm)", border: "1.5px solid var(--border-default)", fontFamily: "var(--font-body)", fontSize: 14, color: "var(--text-strong)", background: "#fff", boxSizing: "border-box" };

function CmsField({ label, value, onChange, area, mono, placeholder }) {
  return (
    <label style={{ display: "block", marginBottom: 12 }}>
      {label && <span style={cmsLabel}>{label}</span>}
      {area ? (
        <textarea value={value || ""} placeholder={placeholder} onChange={(e) => onChange(e.target.value)} rows={area === true ? 3 : area} style={{ ...cmsBox, resize: "vertical", lineHeight: 1.5 }} />
      ) : (
        <input value={value || ""} placeholder={placeholder} onChange={(e) => onChange(e.target.value)} style={{ ...cmsBox, fontFamily: mono ? "var(--font-mono)" : "var(--font-body)" }} />
      )}
    </label>
  );
}

function CmsImageField({ label, value, onChange, P, lang }) {
  const [mode, setMode] = React.useState(null);
  const [url, setUrl] = React.useState("");
  const fileRef = React.useRef(null);
  const t = (th, en) => (lang === "th" ? th : en);
  const btn = { border: "1px solid var(--border-default)", background: "#fff", borderRadius: "var(--radius-pill)", padding: "5px 11px", cursor: "pointer", fontFamily: "var(--font-display)", fontWeight: 600, fontSize: 12, color: "var(--primary)", display: "inline-flex", alignItems: "center", gap: 5 };

        </div>
        <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
          <button style={btn} onClick={() => setMode(m => m === "lib" ? null : "lib")}><I n="grid-3x3" />{t("คลัง", "Library")}</button>
          <button style={btn} onClick={() => setMode(m => m === "url" ? null : "url")}><I n="link" />URL</button>
          <button style={btn} onClick={() => fileRef.current && fileRef.current.click()}><I n="upload" />{t("อัปโหลด", "Upload")}</button>
          {value && <button style={{ ...btn, color: "var(--text-muted)" }} onClick={() => onChange("")}><I n="x" />{t("ลบ", "Clear")}</button>}
          <input ref={fileRef} type="file" accept="image/*" style={{ display: "none" }} onChange={(e) => { cmsDownscale(e.target.files[0], 900, onChange); e.target.value = ""; }} />

      {mode === "url" && (

        </div>
      )}

  );
}

<script type="text/babel" data-presets="react">
function App() {
  const [lang, setLang] = React.useState("th");
  const [data, setData] = React.useState(() => window.NobleStore.load());
  const update = (d) => { setData(d); window.NobleStore.save(d); };
  const go = (id) => {
    const el = document.getElementById(id);
    if (el) window.scrollTo({ top: el.offsetTop - 60, behavior: "smooth" });
  };
  React.useEffect(() => {
    if (window.lucide) { try { window.lucide.createIcons(); } catch (e) {} }
    // Hide loading spinner once React has mounted
    const loader = document.getElementById("noble-loading");
    if (loader) { loader.classList.add("hidden"); setTimeout(() => { loader.style.display = "none"; }, 350); }
  });
  return (
    <React.Fragment>
      <window.NobleHeader lang={lang} setLang={setLang} go={go} data={data} />
      <window.NobleHero lang={lang} go={go} data={data} />
      <window.NobleSections lang={lang} go={go} data={data} />
      <window.NobleClients lang={lang} go={go} data={data} />
      <window.NobleContact lang={lang} data={data} />
      <window.NobleFooter lang={lang} data={data} />
      <window.NobleCMS lang={lang} data={data} onChange={update} />
    </React.Fragment>
  );
}
function mount() {
  if (!window.NobleHeader || !window.NobleHero || !window.NobleSections || !window.NobleClients || !window.NobleContact || !window.NobleCMS || !window.NobleStore || !window.NoblePhotos || !window.TheNobleDesignSystem_288042) {
    return setTimeout(mount, 40);
  }
  ReactDOM.createRoot(document.getElementById("app")).render(<App />);
}
mount();
</script>
</body>
