<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; font-family: var(--font-body); background: var(--surface-page); color: var(--text-body); }
  #root { padding: 28px; }
  .lbl { font-family: var(--font-mono); font-size: 10px; text-transform: uppercase; letter-spacing: .1em; color: var(--text-faint); margin: 0 0 14px; }
  .strip { display: flex; gap: 40px; padding: 22px 26px; background: var(--ink-900); border-radius: var(--radius-lg); position: relative; overflow: hidden; margin-top: 22px; }
  .strip::after { content:""; position:absolute; inset:0; background: var(--gradient-glow); }
  .strip > * { position: relative; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { ServiceCard, StatBlock, SectionHeading } = window.TheNobleDesignSystem_288042;
const Ico = ({ n }) => <i data-lucide={n} style={{ width: 24, height: 24 }}></i>;

function Demo() {
  return (
    <div>
      <SectionHeading eyebrow="บริการของเรา" title="โซลูชันครบวงจร" description="ผู้ให้บริการรายเดียว ตั้งแต่ติดตั้งจนถึงดูแลรักษา" />
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 16, marginTop: 22 }}>
        <ServiceCard icon={<Ico n="server" />} image="https://images.unsplash.com/photo-1558494949-ef010cbdcc31?w=600&q=70&auto=format&fit=crop" title="Computer & Server" description="วางระบบคอมพิวเตอร์ เซิร์ฟเวอร์ NAS พร้อมใช้งาน" />
        <ServiceCard icon={<Ico n="network" />} image="https://images.unsplash.com/photo-1544197150-b99a580bb7a8?w=600&q=70&auto=format&fit=crop" title="Network" description="LAN · Wi-Fi · Fiber Optic มาตรฐานสูง" />
        <ServiceCard icon={<Ico n="cctv" />} title="CCTV System" description="กล้องวงจรปิดครบวงจร IP · NVR · DVR" />
      </div>
      <div className="strip">
        <StatBlock value="13+" label="ปีของประสบการณ์" tone="light" />
        <StatBlock value="99.9%" label="Uptime SLA" tone="light" />
        <StatBlock value="24/7" label="On-site + Remote" tone="light" />
        <StatBlock value="40–60%" label="ประหยัดกว่าจ้างเอง" tone="light" />
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
setTimeout(() => window.lucide && window.lucide.createIcons(), 60);
</script>
</body>
</html>
