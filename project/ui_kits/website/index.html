<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>The Noble Co., Ltd. — IT System Integration</title>
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<script src="content.js"></script>
<script src="photos.js"></script>
<script src="store.js"></script>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body { font-family: var(--font-body); color: var(--text-body); background: var(--surface-card); }
</style>
</head>
<body>
<div id="app"></div>
<script type="text/babel" src="Header.jsx"></script>
<script type="text/babel" src="Hero.jsx"></script>
<script type="text/babel" src="Sections.jsx"></script>
<script type="text/babel" src="Clients.jsx"></script>
<script type="text/babel" src="Contact.jsx"></script>
<script type="text/babel" src="CMS.jsx"></script>
<script type="text/babel" data-presets="react">
function App() {
  const [lang, setLang] = React.useState("th");
  const [data, setData] = React.useState(() => window.NobleStore.load());
  const update = (d) => { setData(d); window.NobleStore.save(d); };
  const go = (id) => {
    const el = document.getElementById(id);
    if (el) window.scrollTo({ top: el.offsetTop - 60, behavior: "smooth" });
  };
  React.useEffect(() => {
    if (window.lucide) { try { window.lucide.createIcons(); } catch (e) {} }
  });
  return (
    <React.Fragment>
      <window.NobleHeader lang={lang} setLang={setLang} go={go} data={data} />
      <window.NobleHero lang={lang} go={go} data={data} />
      <window.NobleSections lang={lang} go={go} data={data} />
      <window.NobleClients lang={lang} go={go} data={data} />
      <window.NobleContact lang={lang} data={data} />
      <window.NobleFooter lang={lang} data={data} />
      <window.NobleCMS lang={lang} data={data} onChange={update} />
    </React.Fragment>
  );
}
function mount() {
  if (!window.NobleHeader || !window.NobleHero || !window.NobleSections || !window.NobleClients || !window.NobleContact || !window.NobleCMS || !window.NobleStore || !window.NoblePhotos || !window.TheNobleDesignSystem_288042) {
    return setTimeout(mount, 40);
  }
  ReactDOM.createRoot(document.getElementById("app")).render(<App />);
}
mount();
</script>
</body>
</html>
