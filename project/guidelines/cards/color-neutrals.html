<!-- @dsCard group="Colors" viewport="700x190" name="Slate Neutrals" subtitle="Cool grays for text, surfaces, borders" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-body); background: var(--surface-card); color: var(--text-body); }
  .wrap { padding: 22px 24px; }
  .row { display: flex; gap: 0; border-radius: var(--radius-md); overflow: hidden; box-shadow: var(--ring-hairline); }
  .sw { flex: 1; height: 92px; display: flex; align-items: flex-end; padding: 7px; box-sizing: border-box; }
  .sw span { font-family: var(--font-mono); font-size: 10px; }
  .meta { margin-top: 10px; font-size: 12px; color: var(--text-muted); }
  .meta b { color: var(--text-strong); font-weight: 600; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="row">
      <div class="sw" style="background:var(--ink-900);color:#fff"><span>900</span></div>
      <div class="sw" style="background:var(--ink-800);color:#fff"><span>800</span></div>
      <div class="sw" style="background:var(--ink-700);color:#fff"><span>700</span></div>
      <div class="sw" style="background:var(--ink-600);color:#fff"><span>600</span></div>
      <div class="sw" style="background:var(--ink-500);color:#fff"><span>500</span></div>
      <div class="sw" style="background:var(--ink-400);color:#0b1220"><span>400</span></div>
      <div class="sw" style="background:var(--ink-300);color:#0b1220"><span>300</span></div>
      <div class="sw" style="background:var(--ink-200);color:#0b1220"><span>200</span></div>
      <div class="sw" style="background:var(--ink-100);color:#0b1220"><span>100</span></div>
      <div class="sw" style="background:var(--ink-50);color:#0b1220"><span>50</span></div>
    </div>
    <div class="meta"><b>--ink-900</b> headings · <b>--ink-700</b> body · <b>--ink-500</b> muted · <b>--ink-150/200</b> borders · <b>--ink-50</b> page</div>
  </div>
</body>
</html>
