<!-- @dsCard group="Spacing" viewport="700x180" name="Spacing Scale" subtitle="8px grid with 4px half-step" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-body); background: var(--surface-card); color: var(--text-body); }
  .wrap { padding: 20px 24px; display: flex; align-items: flex-end; gap: 14px; }
  .col { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .bar { background: var(--gradient-brand); width: 22px; border-radius: var(--radius-xs); }
  .k { font-family: var(--font-mono); font-size: 9px; color: var(--text-muted); }
  .px { font-family: var(--font-mono); font-size: 10px; color: var(--text-strong); font-weight: 600; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="col"><div class="bar" style="height:4px"></div><div class="px">4</div><div class="k">1</div></div>
    <div class="col"><div class="bar" style="height:8px"></div><div class="px">8</div><div class="k">2</div></div>
    <div class="col"><div class="bar" style="height:12px"></div><div class="px">12</div><div class="k">3</div></div>
    <div class="col"><div class="bar" style="height:16px"></div><div class="px">16</div><div class="k">4</div></div>
    <div class="col"><div class="bar" style="height:24px"></div><div class="px">24</div><div class="k">5</div></div>
    <div class="col"><div class="bar" style="height:32px"></div><div class="px">32</div><div class="k">6</div></div>
    <div class="col"><div class="bar" style="height:40px"></div><div class="px">40</div><div class="k">7</div></div>
    <div class="col"><div class="bar" style="height:48px"></div><div class="px">48</div><div class="k">8</div></div>
    <div class="col"><div class="bar" style="height:64px"></div><div class="px">64</div><div class="k">9</div></div>
    <div class="col"><div class="bar" style="height:80px"></div><div class="px">80</div><div class="k">10</div></div>
  </div>
</body>
</html>
