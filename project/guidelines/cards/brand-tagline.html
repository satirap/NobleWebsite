<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-body); background: var(--ink-900); color: #fff; }
  .wrap { padding: 30px 32px; position: relative; overflow: hidden; min-height: 120px; box-sizing: border-box; }
  .wrap::after { content:""; position:absolute; inset:0; background: var(--gradient-glow); }
  .inner { position: relative; }
  .eyebrow { font-family: var(--font-display); text-transform: uppercase; letter-spacing: var(--tracking-eyebrow); font-size: 11px; font-weight: 600; color: var(--blue-300); margin-bottom: 10px; }
  .tag { font-family: var(--font-display); font-weight: 700; font-size: 40px; letter-spacing: -0.02em; margin: 0 0 8px; }
  .sub { font-size: 14px; color: var(--ink-300); margin: 0; max-width: 520px; line-height: var(--leading-relaxed); }
</style>
</head>
<body>
  <div class="wrap"><div class="inner">
    <div class="eyebrow">Brand Tagline</div>
    <p class="tag">Glow together</p>
    <p class="sub">เราเติบโตไปพร้อมกับลูกค้า — confident, warm, and technically precise. We say <b>we</b>, we speak plainly, and we let the work prove itself.</p>
  </div></div>
</body>
</html>
