<!-- @dsCard group="Brand" viewport="700x230" name="Imagery" subtitle="Free Unsplash photography — cool corporate-tech" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-body); background: var(--surface-card); color: var(--text-body); }
  .wrap { padding: 20px 24px; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
  figure { margin: 0; border-radius: var(--radius-md); overflow: hidden; position: relative; aspect-ratio: 4 / 3; box-shadow: var(--ring-hairline); }
  img { width: 100%; height: 100%; object-fit: cover; display: block; }
  figcaption { position: absolute; left: 8px; bottom: 7px; color: #fff; font-family: var(--font-mono); font-size: 10px; text-shadow: 0 1px 4px rgba(0,0,0,.6); }
  .note { margin-top: 12px; font-size: 12px; color: var(--text-muted); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="grid">
      <figure><img src="https://images.unsplash.com/photo-1558494949-ef010cbdcc31?w=500&q=70&auto=format&fit=crop" alt="" /><figcaption>servers</figcaption></figure>
      <figure><img src="https://images.unsplash.com/photo-1544197150-b99a580bb7a8?w=500&q=70&auto=format&fit=crop" alt="" /><figcaption>network</figcaption></figure>
      <figure><img src="https://images.unsplash.com/photo-1557597774-9d273605dfa9?w=500&q=70&auto=format&fit=crop" alt="" /><figcaption>cctv</figcaption></figure>
      <figure><img src="https://images.unsplash.com/photo-1573164713988-8665fc963095?w=500&q=70&auto=format&fit=crop" alt="" /><figcaption>engineers</figcaption></figure>
    </div>
    <div class="note">Cool, crisp, blue-lit hardware &amp; on-site teams. Free for commercial use (Unsplash). Registry: <b>ui_kits/website/photos.js</b>.</div>
  </div>
</body>
</html>
