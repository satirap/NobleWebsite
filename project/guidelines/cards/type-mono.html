<!-- @dsCard group="Type" viewport="700x170" name="Mono — IBM Plex Mono" subtitle="Specs, metrics, technical labels" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-body); background: var(--surface-card); color: var(--text-body); }
  .wrap { padding: 22px 28px; }
  .m { font-family: var(--font-mono); }
  .big { font-size: 30px; font-weight: 600; color: var(--text-strong); letter-spacing: -0.01em; }
  .stat-row { display: flex; gap: 36px; margin-bottom: 14px; }
  .stat .v { font-family: var(--font-mono); font-size: 26px; font-weight: 600; color: var(--blue-700); }
  .stat .k { font-size: 11px; color: var(--text-muted); }
  .line { font-family: var(--font-mono); font-size: 12px; color: var(--text-muted); }
  .line b { color: var(--accent); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="stat-row">
      <div class="stat"><div class="v">99.9%</div><div class="k">Uptime SLA</div></div>
      <div class="stat"><div class="v">13+</div><div class="k">Years</div></div>
      <div class="stat"><div class="v">24/7</div><div class="k">Support</div></div>
    </div>
    <div class="line">MA-PKG-03 · response &lt; <b>4h</b> · on-site + remote · IBM Plex Mono 400/500/600</div>
  </div>
</body>
</html>
