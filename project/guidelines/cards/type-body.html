<!-- @dsCard group="Type" viewport="700x230" name="Body & Eyebrow" subtitle="IBM Plex Sans Thai body + uppercase eyebrow" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-body); background: var(--surface-card); color: var(--text-body); }
  .wrap { padding: 22px 28px; max-width: 560px; }
  .eyebrow { font-family: var(--font-display); text-transform: uppercase; letter-spacing: var(--tracking-eyebrow); font-size: var(--text-2xs); font-weight: 600; color: var(--accent); margin-bottom: 10px; }
  .lg { font-size: var(--text-lg); line-height: var(--leading-relaxed); color: var(--text-strong); margin: 0 0 10px; }
  .base { font-size: var(--text-base); line-height: var(--leading-relaxed); margin: 0 0 10px; }
  .sm { font-size: var(--text-sm); color: var(--text-muted); margin: 0; }
  .tag { font-family: var(--font-mono); font-size: 10px; color: var(--text-faint); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="eyebrow">บริการของเรา · Our Services</div>
    <p class="lg">เราช่วยให้องค์กรของคุณโฟกัสกับธุรกิจหลักได้เต็มที่ <span class="tag">lead · 18</span></p>
    <p class="base">The Noble is a full-service System Integration partner — from computers and networks to CCTV and access control. <span class="tag">body · 16</span></p>
    <p class="sm">ประสบการณ์กว่า 13 ปี · ครอบคลุมกรุงเทพและปริมณฑล <span class="tag">small · 14 · muted</span></p>
  </div>
</body>
</html>
