<!-- @dsCard group="Spacing" viewport="700x210" name="Elevation & Glow" subtitle="Cool-tinted shadows + brand glow" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-body); background: var(--ink-50); color: var(--text-body); }
  .wrap { padding: 26px 24px; display: flex; gap: 20px; flex-wrap: wrap; }
  .col { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .box { width: 96px; height: 64px; background: #fff; border-radius: var(--radius-md); }
  .k { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="col"><div class="box" style="box-shadow:var(--shadow-sm)"></div><div class="k">sm</div></div>
    <div class="col"><div class="box" style="box-shadow:var(--shadow-md)"></div><div class="k">md</div></div>
    <div class="col"><div class="box" style="box-shadow:var(--shadow-lg)"></div><div class="k">lg</div></div>
    <div class="col"><div class="box" style="box-shadow:var(--shadow-xl)"></div><div class="k">xl</div></div>
    <div class="col"><div class="box" style="box-shadow:var(--shadow-glow-blue)"></div><div class="k">glow-blue</div></div>
    <div class="col"><div class="box" style="box-shadow:var(--shadow-glow-red)"></div><div class="k">glow-red</div></div>
  </div>
</body>
</html>
