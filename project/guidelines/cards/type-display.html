<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-body); background: var(--surface-card); color: var(--text-strong); }
  .wrap { padding: 24px 28px; }
  .d { font-family: var(--font-display); font-weight: 700; line-height: var(--leading-tight); letter-spacing: var(--tracking-tight); margin: 0 0 6px; }
  .tag { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); display: block; margin-bottom: 14px; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="d" style="font-size:var(--text-display-xl)">Glow together</div>
    <span class="tag">--font-display · 700 · --text-display-xl</span>
    <div class="d" style="font-size:var(--text-display-lg)">ออกแบบและดูแลระบบไอที</div>
    <span class="tag">--font-display · 700 · --text-display-lg · Thai</span>
  </div>
</body>
</html>
