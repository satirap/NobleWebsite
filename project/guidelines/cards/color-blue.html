<!-- @dsCard group="Colors" viewport="700x180" name="Brand Blue" subtitle="Primary — THE NOBLE royal blue (--blue-700)" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-body); background: var(--surface-card); color: var(--text-body); }
  .wrap { padding: 22px 24px; }
  .row { display: flex; gap: 0; border-radius: var(--radius-md); overflow: hidden; box-shadow: var(--ring-hairline); }
  .sw { flex: 1; height: 88px; display: flex; align-items: flex-end; padding: 8px; box-sizing: border-box; }
  .sw span { font-family: var(--font-mono); font-size: 10px; letter-spacing: .02em; }
  .meta { margin-top: 10px; display: flex; gap: 16px; font-size: 12px; color: var(--text-muted); }
  .meta b { color: var(--text-strong); font-weight: 600; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="row">
      <div class="sw" style="background:var(--blue-900);color:#fff"><span>900</span></div>
      <div class="sw" style="background:var(--blue-800);color:#fff"><span>800</span></div>
      <div class="sw" style="background:var(--blue-700);color:#fff"><span>700 ★</span></div>
      <div class="sw" style="background:var(--blue-600);color:#fff"><span>600</span></div>
      <div class="sw" style="background:var(--blue-500);color:#fff"><span>500</span></div>
      <div class="sw" style="background:var(--blue-300);color:#0b1220"><span>300</span></div>
      <div class="sw" style="background:var(--blue-100);color:#0b1220"><span>100</span></div>
      <div class="sw" style="background:var(--blue-50);color:#0b1220"><span>50</span></div>
    </div>
    <div class="meta"><span><b>--blue-700</b> · #0A51A1 · primary CTA, links, brand fills</span></div>
  </div>
</body>
</html>
